version: '3.8'

services:
  hub:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend/database.db:/app/database.db
    env_file:
      - .env
    restart: always

  ai-node:
    build:
      context: ./ai_node
      dockerfile: Dockerfile
    depends_on:
      - hub
    environment:
      - HUB_URL=http://hub:8001
    env_file:
      - .env
    # Note: For GPU support, additional config would be needed here
    restart: unless-stopped
