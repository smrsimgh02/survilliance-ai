<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI - Legacy Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .brand { padding: 20px; font-size: 20px; font-weight: 800; border-bottom: 1px solid #334155; color: var(--accent); }
        .node-list { flex: 1; overflow-y: auto; padding: 10px; }
        .node-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; background: #334155; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .node-item:hover { background: #475569; }
        .node-item.active { border-color: var(--accent); background: #1e293b; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        
        /* Main View */
        .main-view { flex: 1; position: relative; display: flex; flex-direction: column; background: #000; }
        .video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #videoFeed { max-width: 100%; max-height: 100%; object-fit: contain; }
        #overlay { position: absolute; pointer-events: none; z-index: 10; }
        
        /* HUD */
        .hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .badge { padding: 6px 12px; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 6px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(4px); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .status-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 12px; width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        button { padding: 10px 20px; background: var(--accent); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">SENTINEL AI</div>
            <div class="node-list" id="nodeList">
                <div style="padding: 20px; color: #64748b;">Scanning for nodes...</div>
            </div>
            <div style="padding: 20px;">
                <button onclick="showModal()" style="width: 100%;">+ CONNECT NODE</button>
            </div>
        </aside>

        <main class="main-view">
            <div class="hud-top">
                <div class="badge">
                    <span class="status-dot live" id="wsDot"></span>
                    <span id="curCamName">SELECT A NODE</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="badge">LATENCY: <span id="hudLatency">0</span>ms</div>
                    <div class="badge" style="color: #22c55e;">LIVE</div>
                </div>
            </div>

            <div class="video-container">
                <img id="videoFeed" src="" alt="">
                <canvas id="overlay"></canvas>
            </div>
        </main>
    </div>

    <div class="modal" id="regModal">
        <div class="modal-content">
            <h3>Connect AI Node</h3>
            <input type="text" id="inId" placeholder="Node ID (e.g. cam_01)">
            <input type="text" id="inName" placeholder="Location Name (e.g. Front Gate)">
            <input type="text" id="inUrl" placeholder="Stream URL (0 for laptop cam)">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="registerNode()">CONNECT</button>
                <button onclick="hideModal()" style="background: #ef4444;">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const stream = document.getElementById('videoFeed');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        
        let nodeList = [];
        let focalId = null;
        let boxStore = [];

        async function fetchNodes() {
            try {
                const r = await fetch(`${API}/cameras/`);
                nodeList = await r.json();
                renderSidebar();
            } catch (e) { console.error("Fetch failed", e); }
        }

        function renderSidebar() {
            const container = document.getElementById('nodeList');
            container.innerHTML = nodeList.map(n => `
                <div class="node-item ${focalId === n.id ? 'active' : ''}" onclick="selectNode('${n.id}')">
                    <div style="font-weight: 600;">${n.name}</div>
                    <div style="font-size: 11px; color: #94a3b8; margin-top: 4px;">ID: ${n.id}</div>
                </div>
            `).join('');
        }

        function selectNode(id) {
            focalId = id;
            const node = nodeList.find(n => n.id === id);
            if (node) {
                stream.src = node.url === "0" ? `${API}/video_feed/${id}` : node.url;
                document.getElementById('curCamName').textContent = node.name.toUpperCase();
                renderSidebar();
                fitCanvas();
            }
        }

        async function registerNode() {
            const id = document.getElementById('inId').value;
            const name = document.getElementById('inName').value;
            const url = document.getElementById('inUrl').value;
            if (!id || !name) return alert("Fill all fields");

            await fetch(`${API}/cameras/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name, url, location: "Main", status: "active" })
            });
            hideModal();
            fetchNodes();
        }

        // WebSocket
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socket = new WebSocket(`${protocol}//${window.location.host}/ws/detections`);

            socket.onopen = () => { document.getElementById('wsDot').classList.add('live'); };
            socket.onmessage = (msg) => {
                let items = JSON.parse(msg.data);
                if (!Array.isArray(items)) items = [items];
                
                const now = Date.now();
                
                // Group items by camera to clear them efficiently
                const camIdsInBatch = [...new Set(items.map(i => i.camera_id))];
                
                // Clear old boxes only for cameras present in this new batch
                boxStore = boxStore.filter(b => !camIdsInBatch.includes(b.camera_id));

                items.forEach(data => {
                    if (data.class_name === 'AI-HEARTBEAT') return;
                    
                    // Latency Logic
                    if (data.timestamp) {
                        let diff = now - new Date(data.timestamp).getTime();
                        if (Math.abs(diff) > 10000) diff = 15; 
                        document.getElementById('hudLatency').textContent = diff > 0 ? diff : 10;
                    }
                    
                    // Add to store
                    boxStore.push({ ...data, ts: now });
                });
                
                // Auto-expire anything older than 500ms
                boxStore = boxStore.filter(b => (now - b.ts) < 500);
            };
            socket.onclose = () => {
                document.getElementById('wsDot').classList.remove('live');
                setTimeout(connectWS, 2000);
            };
        }

        function fitCanvas() {
            if (!stream.clientWidth || !stream.naturalWidth) return;
            const nw = stream.naturalWidth, nh = stream.naturalHeight;
            const cw = stream.clientWidth, ch = stream.clientHeight;
            const imageRatio = nw / nh, containerRatio = cw / ch;

            let rw, rh;
            if (containerRatio > imageRatio) {
                rh = ch; rw = ch * imageRatio;
            } else {
                rw = cw; rh = cw / imageRatio;
            }

            overlay.width = rw; overlay.height = rh;
            const left = (cw - rw) / 2, top = (ch - rh) / 2;
            overlay.style.left = (stream.offsetLeft + left) + "px";
            overlay.style.top = (stream.offsetTop + top) + "px";
        }

        function animate() {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            const now = Date.now();
            const activeBoxes = boxStore.filter(b => b.camera_id === focalId && (now - b.ts) < 1000);

            activeBoxes.forEach(b => {
                const x = (b.xcenter - b.width / 2) * overlay.width;
                const y = (b.ycenter - b.height / 2) * overlay.height;
                const w = b.width * overlay.width;
                const h = b.height * overlay.height;

                const txt = `${b.class_name.toUpperCase()} ${(b.confidence * 100).toFixed(0)}%`;
                
                // Threat Logic: Red for dangerous objects, Indigo for others
                const isThreat = ['knife', 'pistol', 'gun', 'weapon', 'fire', 'smoke', 'cigarette', 'alcohol'].includes(b.class_name.toLowerCase());
                const themeColor = isThreat ? '#ff0000' : '#6366f1';
                
                // Sleek Box
                ctx.strokeStyle = themeColor;
                ctx.lineWidth = isThreat ? 4 : 2; // Thicker for threats
                ctx.strokeRect(x, y, w, h);
                
                // Minimal Label
                ctx.fillStyle = themeColor;
                const tw = ctx.measureText(txt).width;
                ctx.fillRect(x, y - 18, tw + 8, 18);

                ctx.fillStyle = '#ffffff';
                ctx.font = '600 11px Inter';
                ctx.fillText(txt, x + 4, y - 5);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', fitCanvas);
        setInterval(fitCanvas, 1000);
        showModal = () => document.getElementById('regModal').style.display = 'flex';
        hideModal = () => document.getElementById('regModal').style.display = 'none';

        fetchNodes();
        connectWS();
        animate();
    </script>
</body>
</html>
