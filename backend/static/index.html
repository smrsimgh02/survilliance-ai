<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Surveillance | Intelligent Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --main-bg: #020617;
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-accent: #3b82f6;
            --danger-red: #f43f5e;
            --text-dark: #f8fafc;
            --text-muted: #94a3b8;
        }

        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--main-bg); height: 100vh; overflow: hidden; color: #fff; }

        .app-layout { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

        /* Sidebar: Camera Management */
        .sidebar { background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 0.75rem; margin: 0; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
        
        .camera-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .camera-item {
            padding: 1rem; margin-bottom: 0.75rem; border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .camera-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(5px); }
        .camera-item.active { background: rgba(59, 130, 246, 0.2); border-color: var(--primary-accent); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        
        .cam-meta { display: flex; flex-direction: column; gap: 2px; }
        .cam-name { font-weight: 600; font-size: 0.85rem; color: #fff; }
        .cam-status { font-size: 0.65rem; color: var(--text-muted); font-family: monospace; }

        .action-btn { 
            color: var(--text-muted); padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
        }
        .camera-item:hover .action-btn { color: var(--danger-red); background: rgba(244, 63, 94, 0.1); }
        .action-btn:hover { background: var(--danger-red) !important; color: #fff !important; }

        .add-node-btn {
            background: var(--primary-accent); color: #fff; border: none;
            width: calc(100% - 2rem); margin: 1rem; padding: 1rem; border-radius: 12px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
            transition: 0.2s; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .add-node-btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Viewport */
        .viewport { display: flex; flex-direction: column; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        .viewport-header { 
            height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 2rem; 
        }
        .viewport-content { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; height: calc(100vh - 70px); }
        
        .stream-container {
            background: #000; border-radius: 24px; overflow: hidden; position: relative; 
            width: 100%; height: 100%; max-width: 1200px; max-height: 80vh;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }
        #mainStream { width: 100%; height: 100%; object-fit: contain; }
        #yoloOverlay { position: absolute; pointer-events: none; z-index: 10; }

        /* HUD Overlays */
        .hud-live { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .hud-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: #1e293b; padding: 2.5rem; border-radius: 24px; width: 450px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .form-input { width: 100%; padding: 1rem; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 12px; margin-bottom: 1.25rem; box-sizing: border-box; font-size: 0.9rem; }
        .form-input:focus { outline: none; border-color: var(--primary-accent); background: rgba(15, 23, 42, 0.8); }
        .btn-submit { width: 100%; padding: 1rem; background: var(--primary-accent); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: #2563eb; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>INTELLIGENCE NODES</h2>
                <div id="badgeCount" style="font-size: 0.65rem; background: var(--primary-accent); padding: 2px 8px; border-radius: 10px;">0</div>
            </div>
            <div class="camera-list" id="cameraList"></div>
            <button class="add-node-btn" onclick="showModal()">+ Register Intelligence Source</button>
        </aside>

        <!-- Main Viewport -->
        <main class="viewport">
            <header class="viewport-header">
                <div id="curCamName" style="font-weight: 600; font-size: 0.9rem;">SELECT HUB SOURCE</div>
                <div style="display:flex; gap: 10px; align-items:center;">
                    <div id="detectCount" style="font-size: 0.65rem; background: #fef3c7; padding: 4px 12px; border-radius: 20px; color: #92400e; font-weight: 600;">DETECTIONS: 0</div>
                    <div id="wsStatus" style="font-size: 0.65rem; background: #fee2e2; padding: 4px 12px; border-radius: 20px; color: #991b1b; font-weight: 600;">WS: ⏳</div>
                    <div id="connStatus" style="font-size: 0.65rem; background: #f1f5f9; padding: 4px 12px; border-radius: 20px; color: var(--text-muted); font-weight: 600;">OFFLINE</div>
                </div>
            </header>

            <div class="viewport-content" id="viewportArea">
                <div class="stream-container" id="streamFrame">
                    <!-- HUD OVERLAYS -->
                    <div class="hud-live">
                        <div class="hud-dot"></div>
                        LIVE FEED
                    </div>
                    <div style="position:absolute; bottom:20px; right:20px; font-family:monospace; font-size:0.7rem; color:rgba(255,255,255,0.5); background:rgba(0,0,0,0.4); padding:4px 10px; border-radius:4px;">
                        LATENCY: <span id="hudLatency">--</span>ms
                    </div>

                    <!-- SCANLINE EFFECT -->
                    <div style="position:absolute; inset:0; pointer-events:none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); z-index: 5; background-size: 100% 4px, 3px 100%;"></div>

                    <img id="mainStream" src="" alt="AWAITING STREAM...">
                    <canvas id="yoloOverlay"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="regModal">
        <div class="modal-body">
            <h3 style="margin:0 0 1.5rem 0; font-size: 1.1rem; color: #1e293b;">Add Intelligence Resource</h3>
            
            <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <button onclick="setSource('laptop')" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; cursor: pointer; font-size: 0.75rem; font-weight: 600;" id="btnLaptop">💻 Laptop Webcam</button>
                <button onclick="setSource('mobile')" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #eff6ff; color: #1d4ed8; cursor: pointer; font-size: 0.75rem; font-weight: 600;" id="btnMobile">📱 Mobile IP Cam</button>
            </div>

            <label style="font-size: 0.75rem; font-weight: 600; margin-bottom: 0.3rem; display: block;">Resource Name</label>
            <input type="text" id="inName" class="form-input" placeholder="e.g. Front Gate">
            
            <div id="divIp">
                <label style="font-size: 0.75rem; font-weight: 600; margin-bottom: 0.3rem; display: block;">Direct IP Address</label>
                <input type="text" id="inIp" class="form-input" placeholder="e.g. 192.168.1.15">
            </div>

            <label style="font-size: 0.75rem; font-weight: 600; margin-bottom: 0.3rem; display: block;">Node Signature (ID)</label>
            <input type="text" id="inId" class="form-input" placeholder="LAPTOP-SOURCE-01">
            
            <button class="btn-submit" onclick="registerNode()">Confirm Connection</button>
            <button onclick="hideModal()" style="width: 100%; border: none; background: none; margin-top: 0.5rem; cursor: pointer; color: var(--text-muted); font-size: 0.75rem;">Cancel</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let focalId = null;
        let nodeList = [];
        let boxStore = [];

        const stream = document.getElementById('mainStream');
        const overlay = document.getElementById('yoloOverlay');
        const ctx = overlay.getContext('2d');

        // CRUD
        async function fetchNodes() {
            try {
                const r = await fetch(`${API}/cameras/`);
                nodeList = await r.json();
                document.getElementById('badgeCount').textContent = nodeList.length;
                renderSidebar();
                if (nodeList.length > 0 && !focalId) selectNode(nodeList[0].id);
            } catch(e) {}
        }

        function renderSidebar() {
            const list = document.getElementById('cameraList');
            if (nodeList.length === 0) { list.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.75rem; padding:2rem;">No nodes registered.</div>'; return; }
            list.innerHTML = nodeList.map(n => `
                <div class="camera-item ${focalId === n.id ? 'active' : ''}" onclick="selectNode('${n.id}')">
                    <div class="cam-meta">
                        <span class="cam-name">${n.name}</span>
                        <span class="cam-status">${n.id}</span>
                    </div>
                    <div class="action-btn" onclick="event.stopPropagation(); deleteNode('${n.id}')">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </div>
                </div>
            `).join('');
        }

        let currentMode = 'mobile';

        function setSource(mode) {
            currentMode = mode;
            const bL = document.getElementById('btnLaptop');
            const bM = document.getElementById('btnMobile');
            if (mode === 'laptop') {
                bL.style.background = '#eff6ff'; bL.style.color = '#1d4ed8'; bL.style.borderColor = '#bfdbfe';
                bM.style.background = '#f8fafc'; bM.style.color = '#64748b'; bM.style.borderColor = '#e2e8f0';
                document.getElementById('divIp').style.display = 'none';
                document.getElementById('inName').value = "Laptop Webcam";
                document.getElementById('inId').value = "LAPTOP-LOCAL-0";
            } else {
                bM.style.background = '#eff6ff'; bM.style.color = '#1d4ed8'; bM.style.borderColor = '#bfdbfe';
                bL.style.background = '#f8fafc'; bL.style.color = '#64748b'; bL.style.borderColor = '#e2e8f0';
                document.getElementById('divIp').style.display = 'block';
                document.getElementById('inName').value = "";
                document.getElementById('inId').value = "";
            }
        }

        async function registerNode() {
            const name = document.getElementById('inName').value;
            const ip = document.getElementById('inIp').value;
            const id = document.getElementById('inId').value;
            if (!name || !id) return alert("Fill Name and ID.");
            
            // For laptop, we use '0' as IP string, for mobile we build IP Webcam URL
            const url = (currentMode === 'laptop') ? "0" : `http://${ip}:8080/video`;
            
            await fetch(`${API}/cameras/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, name, url: url, location: "Main", status: "active"})
            });
            hideModal(); fetchNodes();
        }

        async function deleteNode(id) {
            if (!confirm("Decouple this node?")) return;
            await fetch(`${API}/cameras/${id}`, { method: 'DELETE' });
            if (focalId === id) { focalId = null; stream.src = ""; document.getElementById('curCamName').textContent = "SELECT NODE"; }
            fetchNodes();
        }

        function selectNode(id) {
            focalId = id;
            const node = nodeList.find(n => n.id === id);
            if (node) {
                // If it's laptop cam (url is "0"), use the backend streaming endpoint
                if (node.url === "0") {
                    stream.src = `${API}/video_feed/${id}`;
                } else {
                    stream.src = node.url;
                }
                document.getElementById('curCamName').textContent = node.name.toUpperCase();
                document.getElementById('connStatus').textContent = "CONNECTED: " + id;
                document.getElementById('connStatus').style.background = "#dcfce7";
                document.getElementById('connStatus').style.color = "#166534";
                renderSidebar();
                fitCanvas();
            }
        }

        // Detections & WebSocket with auto-reconnect
        let hubSocket = null;
        let totalDetections = 0;

        function connectWebSocket() {
            const wsEl = document.getElementById('wsStatus');
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            hubSocket = new WebSocket(`${protocol}//${window.location.host}/ws/detections`);
            
            hubSocket.onopen = () => {
                console.log('[WS] Connected to Hub');
                wsEl.textContent = 'WS: ✅ LIVE';
                wsEl.style.background = '#dcfce7';
                wsEl.style.color = '#166534';
            };

            hubSocket.onmessage = (msg) => {
                let items = JSON.parse(msg.data);
                
                // Handle both single objects and arrays
                if (!Array.isArray(items)) items = [items];

                items.forEach(data => {
                    // Skip heartbeats
                    if (data.class_name === 'AI-HEARTBEAT') return;

                    totalDetections++;
                    document.getElementById('detectCount').textContent = 'DETECTIONS: ' + totalDetections;
                    document.getElementById('detectCount').style.background = '#dcfce7';
                    document.getElementById('detectCount').style.color = '#166534';
                    
                    // Update Latency HUD
                    if (data.timestamp) {
                        const ts = new Date(data.timestamp);
                        const diff = Date.now() - ts.getTime();
                        document.getElementById('hudLatency').textContent = diff > 0 ? diff : 15;
                    }

                    // Add to store with timestamp for animation
                    boxStore.push({ ...data, ts: Date.now() });
                });

                // Clear old boxes periodically (keep last 2 seconds)
                const now = Date.now();
                boxStore = boxStore.filter(b => (now - b.ts) < 2000);
            };

            hubSocket.onclose = () => {
                console.log('[WS] Disconnected. Reconnecting in 2s...');
                wsEl.textContent = 'WS: ❌ RECONNECTING';
                wsEl.style.background = '#fee2e2';
                wsEl.style.color = '#991b1b';
                setTimeout(connectWebSocket, 2000);
            };

            hubSocket.onerror = (err) => {
                console.error('[WS] Error:', err);
                hubSocket.close();
            };
        }
        connectWebSocket();



        function getColor(name) {
            const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        // Drawing
        function fitCanvas() {
            if (!stream.clientWidth || !stream.naturalWidth) return;
            
            const nw = stream.naturalWidth;
            const nh = stream.naturalHeight;
            const cw = stream.clientWidth;
            const ch = stream.clientHeight;
            
            const imageRatio = nw / nh;
            const containerRatio = cw / ch;
            
            let renderWidth, renderHeight;
            if (containerRatio > imageRatio) {
                renderHeight = ch;
                renderWidth = ch * imageRatio;
            } else {
                renderWidth = cw;
                renderHeight = cw / imageRatio;
            }
            
            overlay.width = renderWidth;
            overlay.height = renderHeight;
            
            // Critical alignment fix for centering
            const leftOffset = (cw - renderWidth) / 2;
            const topOffset = (ch - renderHeight) / 2;
            
            overlay.style.position = "absolute";
            overlay.style.left = (stream.offsetLeft + leftOffset) + "px";
            overlay.style.top = (stream.offsetTop + topOffset) + "px";
        }
        window.addEventListener('resize', fitCanvas);
        setInterval(fitCanvas, 500);

        function animate() {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            const now = Date.now();
            
            // Only draw boxes for the currently selected camera
            // Filter out detections older than 700ms for smooth real-time feel
            const activeBoxes = boxStore.filter(b => b.camera_id === focalId && (now - b.ts) < 700);
            
            activeBoxes.forEach(b => {
                const x = (b.xcenter - b.width/2) * overlay.width;
                const y = (b.ycenter - b.height/2) * overlay.height;
                const w = b.width * overlay.width;
                const h = b.height * overlay.height;
                const color = getColor(b.class_name);
                
                // Box
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
                
                // Label background
                ctx.fillStyle = color;
                ctx.font = 'bold 12px Inter, sans-serif';
                const label = `${b.class_name} ${(b.confidence * 100).toFixed(0)}%`;
                const textWidth = ctx.measureText(label).width;
                ctx.fillRect(x, y - 20, textWidth + 10, 20);
                
                // Text
                ctx.fillStyle = '#ffffff';
                ctx.fillText(label, x + 5, y - 5);
            });
            
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        function showModal() { document.getElementById('regModal').style.display = 'flex'; }
        function hideModal() { document.getElementById('regModal').style.display = 'none'; }
        fetchNodes();
    </script>
</body>
</html>
